<html lang="zh">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="歌谱本">
<title>我的歌谱本</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root {
  --green:#0F6E56;--green-light:#E1F5EE;--green-mid:#1D9E75;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;
  --gray-bg:#F7F7F5;--border:#E8E8E4;--text:#1a1a1a;--muted:#888;
  --sidebar-w:260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--gray-bg);color:var(--text);}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:#fff;border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;
  transition:transform .25s ease;z-index:100;
}
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.app-title{font-size:16px;font-weight:600;}
.app-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);position:relative;}
.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none;}
.search-box{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--gray-bg);outline:none;color:var(--text);}
.search-box:focus{border-color:var(--green-mid);background:#fff;}

.filter-row{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--border);}
.filter-btn{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);font-family:inherit;transition:all .12s;}
.filter-btn.fa{background:var(--text);border-color:var(--text);color:#fff;}
.filter-btn.fe{background:var(--green);border-color:var(--green);color:#fff;}
.filter-btn.fc{background:var(--blue);border-color:var(--blue);color:#fff;}

.song-list{flex:1;overflow-y:auto;padding:6px 0;}
.song-item{padding:9px 16px;cursor:pointer;transition:background .1s;border-left:3px solid transparent;}
.song-item:hover{background:var(--gray-bg);}
.song-item.ae{background:var(--green-light);border-left-color:var(--green);}
.song-item.ac{background:var(--blue-light);border-left-color:var(--blue);}
.song-title-text{font-size:13px;font-weight:500;line-height:1.3;}
.song-meta-row{display:flex;gap:5px;align-items:center;margin-top:3px;}
.lang-tag{font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;}
.lang-tag.eng{background:var(--green-light);color:var(--green);}
.lang-tag.chn{background:var(--blue-light);color:var(--blue);}
.song-key-tag{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.no-results{padding:20px;font-size:13px;color:var(--muted);text-align:center;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;align-items:center;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:10px;}
.welcome-icon{font-size:40px;}
.welcome-text{font-size:14px;line-height:1.6;}

/* ── HAMBURGER (mobile) ── */
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:200;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;}

/* ── A4 SHEET ── */
.a4{width:100%;max-width:780px;background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:20px;}

.key-bar{display:flex;align-items:center;gap:5px;padding:8px 18px;background:#f4f4f2;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.key-bar-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-right:3px;}
.key-btn{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;font-family:'DM Mono',monospace;transition:all .1s;}
.key-btn:hover{border-color:#999;}
.key-btn.se{background:var(--green);border-color:var(--green);color:#fff;}
.key-btn.sc{background:var(--blue);border-color:var(--blue);color:#fff;}

.hdr-eng{background:var(--green);padding:14px 18px;}
.hdr-chn{background:var(--blue);padding:14px 18px;}
.hdr-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.sname-eng{font-size:18px;font-weight:600;color:#fff;line-height:1.2;}
.sname-chn{font-size:20px;font-weight:600;color:#fff;letter-spacing:.5px;line-height:1.2;}
.sname-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;}
.pills{display:flex;gap:4px;flex-shrink:0;}
.pill{border-radius:20px;padding:3px 8px;font-size:10px;font-weight:500;font-family:'DM Mono',monospace;background:rgba(255,255,255,.2);color:#fff;white-space:nowrap;}

.body{padding:10px 18px;flex:1;display:flex;flex-direction:column;gap:8px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;align-items:start;}
.col-div{border-left:0.5px solid #e4e4e4;padding-left:24px;}

.sec-lbl{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;padding:2px 8px;border-radius:20px;color:#fff;}
.sec-lbl.intro-lbl{background:#9CA3AF;}
.sec-lbl.verse-lbl{background:#3B82F6;}
.sec-lbl.chorus-lbl{background:#10B981;}
.sec-lbl.bridge-lbl{background:#F59E0B;}
.sec-lbl.outro-lbl{background:#9CA3AF;}
.sec-lbl.pre-lbl{background:#8B5CF6;}

/* ── Inline chord-above-lyric rendering ── */
.lyric-line{display:flex;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px;line-height:1;}
.lyric-line.spacer{height:6px;}
.chord-word{display:inline-flex;flex-direction:column;align-items:flex-start;margin-right:2px;}
.chord-token{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;line-height:1;padding-bottom:2px;white-space:nowrap;}
.chord-token.eng{color:var(--green);}
.chord-token.chn{color:var(--blue);}
.chord-token.empty{visibility:hidden;}
.lyric-token{font-size:13px;line-height:1.4;white-space:pre;}

.chord-only{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.chord-only.eng{color:var(--green);}
.chord-only.chn{color:var(--blue);}

.note-box{padding:6px 10px;border-radius:0 4px 4px 0;font-size:11px;color:#444;}
.note-box.eng{background:#f7faf9;border-left:3px solid var(--green-mid);}
.note-box.chn{background:#f0f6fd;border-left:3px solid var(--blue-mid);}

.ftr{border-top:1px solid var(--border);padding:7px 18px;display:flex;justify-content:space-between;align-items:center;}
.kb{font-family:'DM Mono',monospace;font-size:10px;border-radius:4px;padding:2px 8px;font-weight:500;}
.kb.eng{background:var(--green-light);color:var(--green);}
.kb.chn{background:var(--blue-light);color:var(--blue);}
.finfo{font-size:10px;color:#bbb;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .menu-btn{display:block;}
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .overlay.open{display:block;}
  .main{padding:12px 6px;}
  .two-col{grid-template-columns:1fr 1fr;}
  .col-div{border-left:0.5px solid #e4e4e4;padding-left:12px;}
  .ch{font-size:11px;}
  .ly{font-size:11px;}
  .sname-eng{font-size:16px;}
  .sname-chn{font-size:18px;}
  .body{padding:10px 12px;}
}

@media print{
  .sidebar,.menu-btn,.overlay,.key-bar{display:none!important;}
  .main{padding:0;}
  .a4{box-shadow:none;border:none;max-width:100%;}
}
</style>
</head>

const SHARPS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLATS =['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const FLAT_KEYS=['F','Bb','Eb','Ab','Db','Gb'];
function noteIdx(n){let i=SHARPS.indexOf(n);if(i>=0)return i;return FLATS.indexOf(n);}
function transposeNote(n,s,flat){
  const i=noteIdx(n);if(i<0)return n;
  const ni=((i+s)%12+12)%12;
  return flat?FLATS[ni]:SHARPS[ni];
}
function transposeLine(line,s,flat){
  if(s===0)return line;
  return line.replace(/[A-G][#b]?/g,(m,off,str)=>{
    const before=str[off-1];
    if(before&&/[a-z]/.test(before))return m;
    return transposeNote(m,s,flat);
  });
}

// ── State ──────────────────────────────────────────────────
let currentSong=null;
let currentKey={};
let activeFilter='all';
SONGS.forEach(s=>{currentKey[s.id]=s.originalKey;});

// ── Sidebar toggle (mobile) ────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── Filter & search ────────────────────────────────────────
function setFilter(f){
  activeFilter=f;
  ['all','eng','chn'].forEach(x=>{
    const b=document.getElementById('f-'+x);
    b.className='filter-btn'+(x===f?' f'+f:'');
  });
  filterSongs();
}
function filterSongs(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=document.getElementById('songList');
  let html='',count=0;
  SONGS.forEach(s=>{
    if(activeFilter!=='all'&&s.lang!==activeFilter)return;
    if(q&&!s.title.toLowerCase().includes(q)&&!s.titleSub.toLowerCase().includes(q))return;
    const ac=currentSong===s.id?(s.lang==='eng'?'ae':'ac'):'';
    html+=`<div class="song-item ${ac}" onclick="openSong('${s.id}')">
      <div class="song-title-text">${s.title}</div>
      <div class="song-meta-row">
        <span class="lang-tag ${s.lang}">${s.lang==='eng'?'ENG':'中文'}</span>
        <span class="song-key-tag">Key ${currentKey[s.id]} · ${s.bpm}bpm</span>
      </div>
    </div>`;
    count++;
  });
  if(!count)html='<div class="no-results">没有找到歌曲</div>';
  list.innerHTML=html;
}

// ── Render sheet ───────────────────────────────────────────
function getSemis(song,key){
  return((noteIdx(key)-noteIdx(song.originalKey))+12)%12;
}
function tc(line,song,key){
  return transposeLine(line,getSemis(song,key),FLAT_KEYS.includes(key));
}
function renderKeyBar(song){
  const k=currentKey[song.id],sc=song.lang==='eng'?'se':'sc';
  return'<span class="key-bar-label">Key</span>'+
    ALL_KEYS.map(x=>`<button class="key-btn ${k===x?sc:''}" onclick="changeKey('${song.id}','${x}')">${x}</button>`).join('');
}
function secPillClass(id){
  if(/intro/i.test(id))return'intro-lbl';
  if(/verse|主歌/i.test(id))return'verse-lbl';
  if(/chorus|副歌/i.test(id))return'chorus-lbl';
  if(/bridge|桥段/i.test(id))return'bridge-lbl';
  if(/outro|尾奏/i.test(id))return'outro-lbl';
  if(/pre/i.test(id))return'pre-lbl';
  return'intro-lbl';
}
// ── Inline chord+lyric renderer ───────────────────────────
// Each row = one "lyric line" with chords floating above the syllables.
// Strategy: pair chord tokens (split by spaces) with lyric segments,
// rendering each as a vertical stack [chord / lyric] side by side.
function renderLyricLine(chRaw, lyRaw, lang, song, key){
  const ch = tc(chRaw, song, key).trim();
  const ly = lyRaw || '';

  // If no chord at all, just show the lyric
  if(!ch){
    return`<div class="lyric-line"><span class="lyric-token">${ly}</span></div>`;
  }

  // Split chord string into tokens (chords + spaces between)
  // e.g. "C      G/B    C" → ['C','G/B','C'] with spacing info
  const chTokens = ch.split(/\s+/).filter(Boolean);

  // If no lyric, show chord tokens only (no lyric row)
  if(!ly){
    const spans = chTokens.map(t=>
      `<span class="chord-word"><span class="chord-token ${lang}">${t}</span><span class="lyric-token"> </span></span>`
    ).join('<span style="display:inline-flex;flex-direction:column"><span class="chord-token empty">.</span><span class="lyric-token"> </span></span>');
    return`<div class="lyric-line">${chTokens.map(t=>
      `<span class="chord-word"><span class="chord-token ${lang}">${t}</span><span class="lyric-token">&nbsp;&nbsp;</span></span>`
    ).join('')}</div>`;
  }

  // Pair each chord token with a lyric segment.
  // We split the lyric at spaces that roughly align with chord boundaries.
  // Simple approach: distribute lyric characters across chord slots.
  // Split lyric by spaces to get words, then distribute.
  const lyWords = ly.split(' ');

  if(chTokens.length === 1){
    // Single chord: put it above the whole lyric
    return`<div class="lyric-line">
      <span class="chord-word">
        <span class="chord-token ${lang}">${chTokens[0]}</span>
        <span class="lyric-token">${ly}</span>
      </span>
    </div>`;
  }

  // Multiple chords: distribute lyric words across chord tokens
  // Each chord gets at least one word; remainder goes to last chord
  const slots = chTokens.map((t,i) => ({chord:t, words:[]}));
  lyWords.forEach((w,i) => {
    const slot = Math.min(i, slots.length-1);
    slots[slot].words.push(w);
  });

  const html = slots.map(s =>
    `<span class="chord-word">
      <span class="chord-token ${lang}">${s.chord}</span>
      <span class="lyric-token">${s.words.join(' ')}${s.words.length?'&nbsp;':''}</span>
    </span>`
  ).join('');

  return`<div class="lyric-line">${html}</div>`;
}

function renderSec(sec, song, key, lang){
  const pill = `<span class="sec-lbl ${secPillClass(sec.id)}">${sec.label}</span>`;

  if(sec.type === 'chord-only'){
    return`<div style="margin-bottom:10px">${pill}
      <div class="chord-only ${lang}">${sec.lines.map(l=>tc(l,song,key)).join('\n')}</div>
    </div>`;
  }

  const lines = sec.rows.map(r => {
    if(!r.ch && !r.ly) return `<div class="lyric-line spacer"></div>`;
    return renderLyricLine(r.ch, r.ly, lang, song, key);
  }).join('');

  return`<div style="margin-bottom:10px">${pill}${lines}</div>`;
}
// ── Auto-flow two-column layout ────────────────────────────
// Estimates section height in "units" (each lyric row ≈ 1 unit, chord-only line ≈ 0.8)
function estimateHeight(sec){
  const PILL=1.5, GAP=1.0;
  if(sec.type==='chord-only') return PILL + sec.lines.length*1.2 + GAP;
  const rows=sec.rows.filter(r=>r.ch||r.ly).length;
  const blanks=sec.rows.length-rows;
  return PILL + rows*2.0 + blanks*0.5 + GAP;
}
function autoFlowCols(sections){
  const heights=sections.map(estimateHeight);
  const total=heights.reduce((a,b)=>a+b,0);
  const target=total/2;
  let col1=[],col2=[],sum=0,split=false;
  for(let i=0;i<sections.length;i++){
    if(!split && col1.length>0){
      // Switch to col2 if adding this section brings us to or past target
      if(sum+heights[i]>=target){
        // Check: is it closer to switch now or after?
        const diffNow=Math.abs(sum-target);
        const diffAfter=Math.abs(sum+heights[i]-target);
        if(diffNow<=diffAfter){split=true;}
      }
    }
    split?col2.push(sections[i]):col1.push(sections[i]);
    if(!split)sum+=heights[i];
  }
  if(col2.length===0&&col1.length>1){col2.push(col1.pop());}
  return{col1,col2};
}

function buildSheet(song){
  const lang=song.lang,key=currentKey[song.id];
  const hdrCls=lang==='eng'?'hdr-eng':'hdr-chn';
  const nameCls=lang==='eng'?'sname-eng':'sname-chn';

  // Auto-flow: distribute sections into two columns, never splitting a section
  const {col1,col2}=autoFlowCols(song.sections);
  const renderCol=secs=>secs.map(s=>renderSec(s,song,key,lang)).join('<div style="height:10px"></div>');
  const bodyHTML=`<div class="two-col"><div>${renderCol(col1)}</div><div class="col-div">${renderCol(col2)}</div></div>`;

  return`<div class="a4">
    <div class="key-bar">${renderKeyBar(song)}</div>
    <div class="${hdrCls}"><div class="hdr-inner">
      <div>
        <div class="${nameCls}">${song.title}</div>
        ${song.titleSub?`<div class="sname-sub">${song.titleSub}</div>`:''}
      </div>
      <div class="pills">
        <span class="pill">${key}</span>
        <span class="pill">${song.bpm} bpm</span>
        <span class="pill">${song.time}</span>
      </div>
    </div></div>
    <div class="body">
      ${bodyHTML}
      ${song.note?`<div class="note-box ${lang}">💡 ${song.note}</div>`:''}
    </div>
    <div class="ftr">
      <span class="kb ${lang}">Key: ${key}</span>
      <span class="finfo">${song.author}</span>
    </div>
  </div>`;
}
function openSong(id){
  currentSong=id;
  const song=SONGS.find(s=>s.id===id);
  document.getElementById('main').innerHTML=buildSheet(song);
  filterSongs();
  closeSidebar();
}
function changeKey(id,key){
  currentKey[id]=key;
  const song=SONGS.find(s=>s.id===id);
  document.getElementById('main').innerHTML=buildSheet(song);
  filterSongs();
}

filterSongs();
</script>
